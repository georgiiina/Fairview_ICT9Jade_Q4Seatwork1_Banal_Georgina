<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
   <style>

    body {
       
        background-image: url('https://i.pinimg.com/736x/fa/bc/82/fabc828289101f290d7f9360ef9a1f78.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    }

    .login-card {
      
        background-color: rgba(255, 191, 213, 0.9); 
        color: #7a4a5a; 
        padding: 40px;
        border-radius: 30px; 
        width: 380px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        border: 2px solid #ffffff; 
        text-align: center;
    }

  
    .btn-info {
        background-color: #ff85a1 !important;
        border: none !important;
        transition: 0.3s;
    }

    .btn-info:hover {
        background-color: #ff5c8a !important;
        transform: scale(1.05); 
    }

    .btn-light {
        background-color: #fff0f5 !important;
        color: #ff85a1 !important;
        border: 1px solid #ff85a1 !important;
    }

 
    #instructionText {
        display: none; 
        background: rgba(255, 255, 255, 0.8);
        color: #d63384;
        padding: 12px;
        border-radius: 15px;
        margin-top: 15px;
        font-size: 0.85rem;
        border: 1px dashed #ff85a1;
    }

    
    .form-control {
        border: 1px solid #ffbfd5 !important;
        background-color: rgba(255, 255, 255, 0.7) !important;
    }

    .form-control:focus {
        box-shadow: 0 0 8px rgba(255, 133, 161, 0.5) !important;
        border-color: #ff85a1 !important;
    }
</style>
</head>
<body>

    <div class="login-card text-center">
        <h2>Login</h2>
        <p class="opacity-75">Please enter your credentials</p>

        <div class="mb-3 text-start">
            <label class="form-label">Username</label>
            <input type="text" id="userInput" class="form-control rounded-pill" placeholder="Enter here">
        </div>
        
        <div class="mb-3 text-start">
            <label class="form-label">Password</label>
            <input type="password" id="passInput" class="form-control rounded-pill" placeholder="********">
        </div>

        <div class="mb-4 form-check text-start">
            <input type="checkbox" class="form-check-input" id="rememberCheck" onclick="runSwitch()">
            <label class="form-check-label" for="rememberCheck">Stay logged in</label>
        </div>

        <button onclick="checkLogin()" class="btn btn-info rounded-pill px-4 text-white">Login</button>
        <button onclick="clearFields()" class="btn btn-light rounded-pill px-4">Cancel</button>

        <hr>

        <button onclick="toggleInstructions()" class="btn btn-sm btn-outline-warning">Toggle Help</button>
        <div id="instructionText">
            Admin Login: <b>admin</b> / <b>1234</b>
        </div>
    </div>

    <script>
      
        let validUser = "admin";
        let validPass = "1234";


        function checkLogin() {
            let user = document.getElementById("userInput").value;
            let pass = document.getElementById("passInput").value;

            switch (user) {
                case validUser:
                  
                    if (pass === validPass) {
                        window.alert("Access granted! Welcome, " + user);
                    } else {
                        window.alert("Access denied! Incorrect password.");
                    }
                    break;

                case "":
                    window.alert("Please enter a username.");
                    break;

                default:
                    window.alert("Access denied! User not found.");
                    break;
            }
        }

     
        function runSwitch() {
            let isChecked = document.getElementById("rememberCheck").checked;

          
            switch(isChecked) {
                case true:
                    console.log(" Session will persist");
                    break;
                case false:
                    console.log("Standard session");
                    break;
            }
        }

      
        function toggleInstructions() {
            let box = document.getElementById("instructionText");
            if (box.style.display === "none" || box.style.display === "") {
                box.style.display = "block";
                box.innerHTML = "Instruction: Use <b>admin</b> and <b>1234</b>.";
            } else {
                box.style.display = "none";
            }
        }

        function clearFields() {
            document.getElementById("userInput").value = "";
            document.getElementById("passInput").value = "";
        }

     
    </script>

</body>
</html>
